float N(float t) {

float Saw(float b, float t) {

struct DropResult {

    float trail;

DropResult DropLayer2(vec2 uv, float t) {
    vec2 UV = uv;
    uv.y += u_fallRatePhase;
    vec2 a = vec2(6., 1.);
    vec2 grid = a*2.;
    
    // 1. 提取当前列 ID 并计算其专属的垂直偏移 (colShift)

    float colShift = N(colId); 
    
    // 2. 将垂直偏移加到 uv.y，并获取行 ID
    float shiftedY = uv.y + colShift;
    float rowId = floor(shiftedY * grid.y);
    
    vec2 id = vec2(colId, rowId);
    vec2 st = vec2(fract(uv.x * grid.x) - 0.5, fract(shiftedY * grid.y));
    
    vec3 n = N13(id.x*35.2+id.y*2376.1);
    float presence = S(0.0, 0.05, u_heavyRainRatio - n.y);
    float x = n.x-.5;
    
    float wiggleScale = 1.0 - clamp(u_dropFriction, 0.0, 1.0) * 0.85;
    float wiggleFreq = 1.0 + u_dropFriction * 1.5;

    float y_wiggle = UV.y * 20.0 * wiggleFreq;
    float wiggle = sin(y_wiggle+sin(y_wiggle)) * wiggleScale;
    x += wiggle*(.5-abs(x))*(n.z-.5);
    x *= .7;
    float ti = fract(t+n.z);
    float y = (Saw(.85, ti)-.5)*.9+.5;
    
    // 物理雨滴下落合并增长：当下落距离增加（y 变小），吞并小雨水使体积增大
    float currentDropSize = u_beadRadius * (1.0 + (1.0 - y) * u_fusionForce * 0.15);
    float clampedDropSize = clamp(currentDropSize, 0.1, 1.5);
    
    vec2 p = vec2(x, y);
    
    float cd = abs(st.x-x);
    float d = length((st-p)*a.yx);
    float mainDrop = S(clampedDropSize, .0, d) * presence;
    
    // 物理无缝扫过路径：宽度与大雨滴实际视觉宽度 (clampedDropSize * 0.65) 完美匹配，防止路径过宽导致未接触即消失
    float cellSweep = S(-0.02, 0.05, st.y - y) * S(clampedDropSize * 0.65, 0.0, cd) * exp(-(st.y - y) * 1.8) * presence;

    float dist = st.y - y;

    float horizontalWipe = S(swallowRange * 1.1, 0.0, cd);
    float localRecovery = mix(1.0, mix(1.0, S(0.35, 0.95, wipeDist), horizontalWipe), presence);
    
    // 3. 采样相邻区域，支持大水滴跨越多个 grid cell
    if (u_perfOptimization < 0.5) {
        for(int dx = -1; dx <= 1; dx++) {
            for(int dy = -2; dy <= 2; dy++) {
                if(dx == 0 && dy == 0) continue;
                
                float nColId = colId + float(dx);
                float nColShift = N(nColId);
                
                float nRowId = rowId + floor(0.5 + (nColShift - colShift) * grid.y);
                float rowDiff = nRowId - rowId;
                float staggerDiff = (nColShift - colShift) * grid.y;
                
                vec2 nId = vec2(nColId, nRowId + float(dy));
                vec3 nn = N13(nId.x*35.2+nId.y*2376.1);
                
                float nPresence = S(0.0, 0.05, u_heavyRainRatio - nn.y);
                if (nPresence > 0.001) {
                    float nx = nn.x-.5;
                    float ny_wiggle = UV.y * 20.0 * wiggleFreq;
                    float nwiggle = sin(ny_wiggle+sin(ny_wiggle)) * wiggleScale;
                    nx += nwiggle*(.5-abs(nx))*(nn.z-.5);
                    nx *= .7;
                    
                    float nti = fract(t+nn.z);
                    float ny = (Saw(.85, nti)-.5)*.9+.5;
                    
                    float nCurrentNDropSize = u_beadRadius * (1.0 + (1.0 - ny) * u_fusionForce * 0.15);
                    float nClampedDropSize = clamp(nCurrentNDropSize, 0.1, 1.5);
                    
                    vec2 np = vec2(nx + float(dx), ny + float(dy) + rowDiff - staggerDiff);
                    float nd = length((st-np)*a.yx);
                    
                    float neighborDrop = S(nClampedDropSize, .0, nd) * nPresence;
                    mainDrop = max(mainDrop, neighborDrop);
                    
                    // 完美计算邻居雨滴在当前单元格产生的 swept path 扫过轨迹（宽度限制为实际视觉边界）
                    float n_cd = abs(st.x - np.x);
                    float neighborSweep = S(-0.02, 0.05, st.y - np.y) * S(nClampedDropSize * 0.65, 0.0, n_cd) * exp(-(st.y - np.y) * 1.8) * nPresence;
                    cellSweep = max(cellSweep, neighborSweep);
                    
                    // 邻居吞食区域，同样使用基于真实物理接触边界的平滑过渡
                    float nSwallowRange = nClampedDropSize * (0.62 + u_fusionForce * 0.03);
                    float neighborSwallow = S(nSwallowRange * 1.05, nSwallowRange * 0.95, nd) * nPresence;
                    mainSwallow = max(mainSwallow, neighborSwallow);
                    
                    // 邻居平滑恢复因子：计算并更新最小恢复值（被任意一个邻居大雨滴吞噬的区域都会降低其 recovery）
                    float n_dist = st.y - np.y;
                    float n_wipeDist = fract(n_dist);
                    float n_horizontalWipe = S(nSwallowRange * 1.1, 0.0, n_cd);
                    float neighborRecovery = mix(1.0, S(0.35, 0.95, n_wipeDist), n_horizontalWipe);

                    localRecovery = min(localRecovery, neighborRecovery);
                }
            }
        }
    }
    
    float r = pow(S(1., y, st.y), 0.5 * u_smearDecay);
    float trail = S(.23 * u_smearPower * r, .15*r*r, cd) * presence;
    float trailFront = S(-.02, .02, st.y-y);
    trail *= trailFront*pow(r, 0.35);
    
    y = UV.y;
    float trail2 = S(.2*r, .0, cd);
    float droplets = max(0., (sin(y*(1.-y)*120.)-st.y))*trail2*trailFront*n.z * presence;
    y = fract(y*10.)+(st.y-.5);
    float dd = length(st-vec2(x, y));
    droplets = S(.3, 0., dd)*trail2*trailFront*n.z * presence;
    float m = mainDrop+droplets*r*trailFront;
    
    DropResult result;
    result.m = m;
    result.trail = trail;
    result.sweep = cellSweep;
    result.swallow = mainSwallow;
    result.recovery = localRecovery;
    return result;
}

float StaticDrops(vec2 uv, float t, float recovery) {
    float density = u_beadDensity;
    vec2 scaled_uv = uv * density;
    vec2 id = floor(scaled_uv);
    vec2 local_uv = fract(scaled_uv)-.5;
    
    // Use a completely stable seed so that static raindrops never jump or teleport
    vec3 n = N13(id.x*107.45 + id.y*3543.654);
    vec2 p = (n.xy-.5)*.7;
    float d = length(local_uv-p);
    
    float fade = Saw(.025, fract(t+n.z));
    
    // 引入基于随机因子的独立阈值，使不同水珠的重新生成是随机交错、在时间上逐渐产生的
    float threshold = fract(n.z * 23.45);
    float randThreshold = threshold * 0.8;
    float activeRecovery = S(randThreshold, randThreshold + 0.2, recovery);
    
    // Decouple droplet size from density: scale local size proportionally to density (reference density is 34.0)
    float scaleFactor = density / 34.0;
    float clampedSize = clamp(u_beadScale * activeRecovery * scaleFactor, 0.0, 1.2);
    float c = S(clampedSize, 0., d)*fract(n.z*10.)*fade;
    
    if (u_perfOptimization < 0.5) {
        for(int dx = -1; dx <= 1; dx++) {
            for(int dy = -1; dy <= 1; dy++) {
                if(dx == 0 && dy == 0) continue;
                
                vec2 neighborId = id + vec2(float(dx), float(dy));
                vec3 nn = N13(neighborId.x*107.45 + neighborId.y*3543.654);
                vec2 np = (nn.xy-.5)*.7 - vec2(float(dx), float(dy));
                float nd = length(local_uv-np);
                
                float neighborFade = Saw(.025, fract(t+nn.z));
                
                // 邻居水珠也有专属的随机生成阈值，实现交错成长
                float neighborThreshold = fract(nn.z * 23.45);
                float nRandThreshold = neighborThreshold * 0.8;
                float nActiveRecovery = S(nRandThreshold, nRandThreshold + 0.2, recovery);
                float nClampedSize = clamp(u_beadScale * nActiveRecovery * scaleFactor, 0.0, 1.2);
                
                float neighborC = S(nClampedSize, 0., nd)*fract(nn.z*10.)*neighborFade;
                c = max(c, neighborC);
            }
        }
    }
    
    return c;
}

DropResult DropLayerFast(vec2 uv, float t) {
    vec2 UV = uv;
    // We split horizontally into 7 columns for a very natural density
    float gridCol = 7.0;
    float colId = floor(uv.x * gridCol);
    float colShift = N(colId * 543.21);
    
    // Linear base progression for calculating the cycle index using integrated drop speed time
    float baseProgress = u_fallRatePhase * (1.8 + N(colId * 135.24) * 2.4) + colShift;
    float cycle = floor(baseProgress);
    float progress = fract(baseProgress);
    
    // Dynamic seed for this cycle/drop

    float currentDropSize = clamp(u_beadRadius * (0.45 + sizeSeed * 0.55), 0.06, 0.9);

float getLightning(float time, float freq) {

        if (t > 0.0 && t < 1.8) {
            // Main lightning strike
            float flash1 = exp(-t * 15.0) * 1.8;
            
            // Secondary strike (double peak) with variable gap
            float t2 = t - (0.10 + n.z * 0.12);
            float flash2 = (t2 > 0.0) ? exp(-t2 * 9.0) * 1.0 : 0.0;
            
            // Tertiary strike (triple peak) with variable gap
            float t3 = t - (0.30 + n.y * 0.15);
            float flash3 = (t3 > 0.0) ? exp(-t3 * 4.0) * 0.5 : 0.0;
            
            float strength = max(flash1, max(flash2, flash3));
            // Organic flickering frequency that is unique to each strike
            strength *= 0.5 + 0.5 * sin(time * (100.0 + n.z * 50.0));
            // Vary the maximum brightness of each strike
            strength *= 0.4 + 0.6 * n.y;
            return strength;
        }
    }
    return 0.0;
}
